name: Build macOS app

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Package
        run: chmod +x Scripts/*.sh && Scripts/package-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: SpoilerDelay-macOS
          path: build/SpoilerDelay-macOS.zip
